# The ACME rehearsal stack — a REAL (test) ACME server (pebble) + the plane built with the default-off
# `acme` feature + the same digest-pinned Postgres the main compose uses. Self-contained: only
# scripts/acme-rehearsal.sh drives it (under an ephemeral project name); the repo-root docker-compose.yml
# is untouched. NOTHING here is production material — pebble is a test CA with a publicly-known HTTPS key.

services:
  pebble:
    # Pinned by the multi-arch index digest. Refresh: docker buildx imagetools inspect ghcr.io/letsencrypt/pebble:latest
    image: ghcr.io/letsencrypt/pebble@sha256:ddf230642b1a584f519f32e347de1b05a6e4c1f6c35c1863b33effeab5f78199
    # -strict fails on ACME spec violations instead of tolerating them. Started WITHOUT -dnsserver,
    # pebble validates tls-alpn-01 through the container's system resolver — Docker's embedded DNS —
    # which resolves the plane's compose network alias below.
    command: -config /pebble/pebble-config.json -strict
    environment:
      # No random validation sleeps — the rehearsal polls bounded.
      PEBBLE_VA_NOSLEEP: "1"
    volumes:
      - ./pebble-config.json:/pebble/pebble-config.json:ro
    ports:
      # The management API: GET /roots/0 serves the per-boot ISSUING root the rehearsal verifies TLS
      # against (the endpoint's own HTTPS cert is signed by the committed minica TEST root).
      - "15000:15000"

  db:
    # The same digest-pinned Postgres as the repo-root docker-compose.yml.
    image: postgres:18@sha256:4aabea78cf39b90e834caf3af7d602a18565f6fe2508705c8d01aa63245c2e20
    environment:
      POSTGRES_USER: topos
      POSTGRES_PASSWORD: topos
      POSTGRES_DB: topos
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U topos -d topos"]
      interval: 5s
      timeout: 5s
      retries: 12

  plane:
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        # The whole point of the rehearsal: the plane image with the ACME serve path compiled in.
        FEATURES: acme
    depends_on:
      db:
        condition: service_healthy
      pebble:
        condition: service_started
    networks:
      default:
        aliases:
          # The name the certificate is issued for — pebble's tls-alpn-01 validation dials it (via
          # Docker's embedded DNS) and lands on this container's :8443 TLS acceptor.
          - plane.rehearsal.test
    environment:
      DATABASE_URL: postgres://topos:topos@db:5432/topos
      TOPOS_PLANE_ACME_DOMAINS: plane.rehearsal.test
      TOPOS_PLANE_ACME_CONTACT: mailto:ops@rehearsal.test
      # On the data volume, so the ACME account + issued certificate survive a container restart —
      # step 3 of the rehearsal proves exactly that.
      TOPOS_PLANE_ACME_CACHE: /data/acme
      TOPOS_PLANE_ACME_DIRECTORY: https://pebble:14000/dir
      # The minica TEST root (committed beside this file) that signs pebble's own HTTPS endpoint — the
      # extra-root knob is exactly for this: reaching a TEST directory over TLS.
      TOPOS_PLANE_ACME_EXTRA_ROOT: /rehearsal/pebble.minica.pem
    volumes:
      - plane-data:/data
      - ./pebble.minica.pem:/rehearsal/pebble.minica.pem:ro
    ports:
      - "8787:8787"
      - "8443:8443"

volumes:
  plane-data:
