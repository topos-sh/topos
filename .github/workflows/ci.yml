name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # plane-store's compile-time-checked queries read the committed `crates/plane-store/.sqlx` metadata
  # instead of opening a live database. The dedicated `sqlx-drift` job below regenerates that metadata
  # and fails if it has drifted from the schema.
  SQLX_OFFLINE: "true"

jobs:
  gate:
    name: gate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      # Honors rust-toolchain.toml (pinned channel + rustfmt/clippy components) — do NOT pin a
      # channel here, or it would override the repo's reproducible toolchain.
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: format
        run: cargo fmt --all --check
      - name: clippy (warnings are errors)
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
      # Doc-comments are load-bearing: topos-types `///`s become the committed JSON-Schema field
      # descriptions, and intra-doc links must not rot. Deny rustdoc warnings.
      - name: docs (broken intra-doc links are errors)
        run: cargo doc --workspace --no-deps --locked
        env:
          RUSTDOCFLAGS: -D warnings
      - name: test
        run: cargo test --workspace --locked
      - name: contract drift gate (schemas)
        run: cargo run -p xtask --locked -- gen-schema --check
      - name: contract drift gate (fixtures)
        run: cargo run -p xtask --locked -- gen-fixtures --check
      - name: architectural layering
        run: cargo run -p xtask --locked -- check-arch

  deny:
    name: cargo-deny (advisories + licenses)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  sqlx-drift:
    name: sqlx offline-metadata drift gate
    runs-on: ubuntu-latest
    env:
      # This job regenerates the query metadata against a live database, so it must NOT read the
      # committed `.sqlx` — override the workspace-wide offline flag.
      SQLX_OFFLINE: "false"
      DATABASE_URL: "sqlite://${{ github.workspace }}/plane-store-ci.db"
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      # Pin the CLI to the EXACT library version. A bare `cargo install sqlx-cli` resolves to a newer
      # major whose generated metadata format differs from the pinned library's, which would silently
      # turn this drift gate into a no-op.
      - name: install sqlx-cli (pinned to the library version)
        run: cargo install sqlx-cli --version 0.8.6 --locked --no-default-features --features sqlite
      - name: create + migrate a scratch database
        run: |
          sqlx database create
          sqlx migrate run --source crates/plane-store/migrations
      # `-- --tests --features test-fixtures` matches the scope the committed metadata was generated with:
      # the seed/shim queries are gated `#[cfg(any(test, feature = "test-fixtures"))]`, so both `--tests`
      # (the `test` cfg) and `--features test-fixtures` activate them. Covering the feature here keeps the
      # downstream-facing shims (which the HERO + plane route tests drive) under the drift gate too. (sqlx's
      # `prepare` forwards every token after `--` to the build, so `--features` belongs there, not before it.)
      - name: prepare --check (fails if the committed .sqlx has drifted from the schema)
        working-directory: crates/plane-store
        run: cargo sqlx prepare --check -- --tests --features test-fixtures
