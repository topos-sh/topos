# cargo-deny — advisories + licenses.
#
# NOTE on the client architectural-layering ban:
# "the topos client carries no plane-store / sqlx / libsqlite3-sys" is NOT a global cargo-deny
# `bans.deny` (those crates legitimately appear in the workspace via plane-store/topos-plane).
# It is a per-target dependency-tree assertion (`cargo xtask check-arch`) in CI. cargo-deny here
# owns advisories + license policy only.

[advisories]
version = 2
yanked = "deny"

[licenses]
version = 2
allow = [
    "Apache-2.0",
    "MIT",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
]
confidence-threshold = 0.9
# All workspace crates are publish = false; don't license-check our own unpublished members.
private = { ignore = true }
# Forward-stage: the client's rustls→ring TLS stack (lands with the client transport) ships a
# BoringSSL-derived license blend that cargo-deny can't map to one SPDX id. Allow OpenSSL *only*
# for ring, scoped — so the first commit that wires TLS doesn't red-light the license check.
[[licenses.exceptions]]
crate = "ring"
allow = ["OpenSSL"]

[bans]
multiple-versions = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
