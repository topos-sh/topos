# cargo-deny — advisories + licenses.
#
# NOTE on the client architectural-layering ban:
# "the topos client carries no plane-store / sqlx / libsqlite3-sys" is NOT a global cargo-deny
# `bans.deny` (those crates legitimately appear in the workspace via plane-store/topos-plane).
# It is a per-target dependency-tree assertion (`cargo xtask check-arch`) in CI. cargo-deny here
# owns advisories + license policy only.

[advisories]
version = 2
yanked = "deny"
ignore = [
    # RUSTSEC-2023-0071 ("Marvin Attack" — RSA private-key decryption timing; no fixed release exists).
    # `rsa` reaches the tree ONLY through the default-off `enroll-oidc` feature (openidconnect), which
    # uses it to VERIFY provider JWT signatures — public-key operations. The advisory's timing channel
    # requires RSA private-key decryption, and no RSA private key exists anywhere in this workspace
    # (all signing here is Ed25519). Revisit if the OIDC connector ever gains an RSA private-key op.
    { id = "RUSTSEC-2023-0071", reason = "verify-only RSA in the feature-gated OIDC connector; no RSA private-key operations in the workspace" },
]

[licenses]
version = 2
allow = [
    "Apache-2.0",
    "MIT",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
]
confidence-threshold = 0.9
# All workspace crates are publish = false; don't license-check our own unpublished members.
private = { ignore = true }

# The WebPKI trust-store data (pulled in by the rustls stack via ureq) ships under the
# Community Data License Agreement — permissive, data-only, scoped to this one crate.
[[licenses.exceptions]]
crate = "webpki-roots"
allow = ["CDLA-Permissive-2.0"]

[bans]
multiple-versions = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
