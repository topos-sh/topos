# Self-host Topos in one command: the web app (the ONE public surface), the stateless plane behind it,
# and a pinned Postgres, on one internal network.
#
#   docker compose up --build      # the app on http://localhost:3000; the plane + Postgres beside it,
#                                  # reachable only on the compose network (no published ports)
#
# The TOPOLOGY after the door cutover: the WEB APP is the only thing the world reaches. It fronts `/api`,
# serves the resource addresses + the constant protocol card, and drives the plane over an internal
# session lane. The PLANE has NO published port — it answers on the compose-internal network only, at
# `http://plane:8787`. Postgres is a SEPARATE service (never baked into an app image); the plane migrates
# the `plane` schema on boot, the web app migrates its own `web` schema at first request.
#
# ── the change-me defaults ─────────────────────────────────────────────────────────────────────────────
# Every secret below has a `change-me-…` default so a first `up` works with zero setup on a laptop. They
# are FINE for a local trial and UNSAFE for anything reachable: for a real deployment you MUST override
#   TOPOS_INTERNAL_TOKEN   (the app↔plane internal-lane bearer)
#   TOPOS_WEB_AUTH_SECRET  (Better Auth session signing — must be ≥ 32 chars)
#   TOPOS_PLANE_DB_PASSWORD / TOPOS_WEB_DB_PASSWORD   (the two database roles)
# and set TOPOS_PUBLIC_URL to your externally reachable origin (behind a TLS-terminating reverse proxy).
# Put them in a `.env` file beside this one, or export them in the shell.
#
# ── bring your own Postgres ────────────────────────────────────────────────────────────────────────────
# To use a managed/external database instead of the bundled `db`: create the two roles + the `plane`
# schema + the search_paths it expects (scripts/compose-init-db.sh is the exact recipe; run it once
# against your server), then set the plane's DATABASE_URL (as topos_plane) and the web's DATABASE_URL (as
# topos_web) to point there and start with `--no-deps` so the bundled `db` stays down. A networked
# Postgres should append `?sslmode=require`.

services:
  db:
    # Pinned by the multi-arch index digest for reproducibility. To track Postgres patch releases on
    # `pull` instead, drop the `@sha256:…` and keep `postgres:18` — both are safe, the plane migrates
    # its own schema. Refresh the pin: docker buildx imagetools inspect postgres:18
    image: postgres:18@sha256:4aabea78cf39b90e834caf3af7d602a18565f6fe2508705c8d01aa63245c2e20
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-topos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-topos}
      POSTGRES_DB: ${POSTGRES_DB:-topos}
      # Read by the init script (below) to create the two app roles. The superuser above owns nothing the
      # app uses — the plane connects as topos_plane, the web app as topos_web.
      TOPOS_PLANE_DB_PASSWORD: ${TOPOS_PLANE_DB_PASSWORD:-plane}
      TOPOS_WEB_DB_PASSWORD: ${TOPOS_WEB_DB_PASSWORD:-web}
    volumes:
      # The metadata database — back this up with `pg_dump` or a volume snapshot (see the README).
      # Mount at the image's PARENT data path, not `/var/lib/postgresql/data`: at v18 the official postgres
      # image moved its declared VOLUME to `/var/lib/postgresql` and its default PGDATA to
      # `/var/lib/postgresql/18/docker`. Mounting the old `/var/lib/postgresql/data` path makes postgres:18
      # refuse to start. Upgrading an EXISTING pre-18 `pg-data` volume is a `pg_dump`/restore into this new
      # layout (see the README's backups section) — an in-place tag bump against the old mount will not start.
      - pg-data:/var/lib/postgresql
      # First-boot ONLY (initdb runs it once, on a fresh volume, before accepting TCP): create the two
      # roles + schema `plane` + the search_paths BEFORE the plane boots — migration 0019's web grants
      # skip if topos_web is absent, so the roles must already exist.
      - ./scripts/compose-init-db.sh:/docker-entrypoint-initdb.d/10-topos-init.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-topos} -d ${POSTGRES_DB:-topos}"]
      interval: 5s
      timeout: 5s
      retries: 12

  plane:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    # NO `ports:` — the plane is internal-only. The web app reaches it at http://plane:8787 over the
    # compose network; nothing outside the network can. (The image already binds 0.0.0.0:8787.)
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Connects as topos_plane (owns schema `plane`, runs the migrations). A managed/networked Postgres
      # should append `?sslmode=require` — the plane speaks TLS to Postgres over rustls.
      DATABASE_URL: postgres://topos_plane:${TOPOS_PLANE_DB_PASSWORD:-plane}@db:5432/${POSTGRES_DB:-topos}
      # The plane's PUBLIC-facing bases now all route THROUGH THE APP. The API base is the app origin + /api
      # (the app fronts `/api`); the human verification pages + the `/i/` claim links live on the app origin.
      TOPOS_PLANE_BASE_URL: ${TOPOS_PUBLIC_URL:-http://localhost:3000}/api
      TOPOS_PLANE_VERIFY_BASE_URL: ${TOPOS_PUBLIC_URL:-http://localhost:3000}
      TOPOS_PLANE_LINK_BASE_URL: ${TOPOS_PUBLIC_URL:-http://localhost:3000}
      TOPOS_PLANE_MODE: self_host
      # The internal session lane's shared bearer — the app is the only holder; with it unset the plane
      # answers 404 on the whole /internal lane. Must match the web app's PLANE_INTERNAL_TOKEN below.
      TOPOS_PLANE_INTERNAL_TOKEN: ${TOPOS_INTERNAL_TOKEN:-change-me-internal-token}
      # Rate limiting OFF. The plane's limiter buckets per PEER IP, and in this topology its only peer is
      # the web app — so an enabled bucket would throttle the ENTIRE fleet as if it were one client. The
      # public belt belongs on the app (its own sign-in/step-up limiters) and/or the reverse proxy; the
      # plane sits behind them on a trusted network.
      TOPOS_PLANE_RATELIMIT: "off"
    volumes:
      # The git-object + large-object stores and the 0600 enrollment secret (generated on
      # first boot). Snapshot these BEFORE the database (see the README's backup order).
      - plane-data:/data

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      plane:
        condition: service_started
    ports:
      - "3000:3000"
    environment:
      # Connects as topos_web (owns schema `web`, reads `plane`, writes it only through the guarded
      # topos_* functions). Migrates its own `web` schema at first request.
      DATABASE_URL: postgres://topos_web:${TOPOS_WEB_DB_PASSWORD:-web}@db:5432/${POSTGRES_DB:-topos}
      # The internal session lane — the plane, over the compose network, with the shared bearer.
      PLANE_INTERNAL_URL: http://plane:8787
      PLANE_INTERNAL_TOKEN: ${TOPOS_INTERNAL_TOKEN:-change-me-internal-token}
      # The app's externally reachable origin — the ONE public base every client-visible URL rides:
      # the resource addresses, the protocol card's `api_base_url` (this origin + `/api`), and the
      # sign-in/verification pages. Behind a TLS-terminating proxy this MUST be set to the public
      # `https://…` origin (the app cannot infer it from the request — the proxy speaks plain HTTP to
      # the container), or the card would declare an `http://` base the CLI refuses to downgrade onto.
      #
      # Deliberately NOT defaulted: passed through EMPTY, the app falls back to the REQUEST's own
      # origin, so a bare `up` works on the laptop AND from another machine on the LAN. A localhost
      # default would instead make localhost CANONICAL — and the app 301s browsers on any other host
      # to it, bouncing every remote visitor back to their own machine.
      TOPOS_PUBLIC_URL: ${TOPOS_PUBLIC_URL:-}
      # Better Auth: the session-signing secret (≥ 32 chars — the app refuses to parse a shorter one) and
      # the public origin sessions are minted for. BETTER_AUTH_URL is the app's externally reachable origin.
      BETTER_AUTH_SECRET: ${TOPOS_WEB_AUTH_SECRET:-change-me-auth-secret-change-me-auth-secret}
      BETTER_AUTH_URL: ${TOPOS_PUBLIC_URL:-http://localhost:3000}
      # Outbound mail — BRING YOUR OWN SMTP, all five or none (passed through empty = mail off,
      # and everything still works: invites share the workspace address, enrollment approves in
      # the app). Armed, invite notices really send and emailed-passcode enrollment becomes
      # available (advertise it on the plane with TOPOS_PLANE_ENROLLMENT_METHOD=passcode).
      TOPOS_MAIL_SMTP_HOST: ${TOPOS_MAIL_SMTP_HOST:-}
      TOPOS_MAIL_SMTP_PORT: ${TOPOS_MAIL_SMTP_PORT:-}
      TOPOS_MAIL_SMTP_USER: ${TOPOS_MAIL_SMTP_USER:-}
      TOPOS_MAIL_SMTP_PASS: ${TOPOS_MAIL_SMTP_PASS:-}
      TOPOS_MAIL_SMTP_FROM: ${TOPOS_MAIL_SMTP_FROM:-}
      APP_ENV: production

volumes:
  pg-data:
  plane-data:
