# Self-host the Topos plane: the stateless plane container + a pinned Postgres, in one command.
#
#   docker compose up --build      # plane on http://localhost:8787, Postgres beside it
#
# Bring-your-own Postgres: set DATABASE_URL to your managed/external database (a `.env` file or the shell)
# and start just the plane — `docker compose up --build --no-deps plane` — so the bundled `db` service stays
# down (`--no-deps`, since the plane declares it as a dependency).
# Postgres is a SEPARATE service (never baked into the plane image); the plane migrates the schema on start.

services:
  db:
    # Pinned by the multi-arch index digest for reproducibility. To track Postgres patch releases on
    # `pull` instead, drop the `@sha256:…` and keep `postgres:18` — both are safe, the plane migrates
    # its own schema. Refresh the pin: docker buildx imagetools inspect postgres:18
    image: postgres:18@sha256:4aabea78cf39b90e834caf3af7d602a18565f6fe2508705c8d01aa63245c2e20
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-topos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-topos}
      POSTGRES_DB: ${POSTGRES_DB:-topos}
    volumes:
      # The metadata database — back this up with `pg_dump` or a volume snapshot (see the README).
      # Mount at the image's PARENT data path, not `/var/lib/postgresql/data`: at v18 the official postgres
      # image moved its declared VOLUME to `/var/lib/postgresql` and its default PGDATA to
      # `/var/lib/postgresql/18/docker`. Mounting the old `/var/lib/postgresql/data` path makes postgres:18
      # refuse to start. Upgrading an EXISTING pre-18 `pg-data` volume is a `pg_dump`/restore into this new
      # layout (see the README's backups section) — an in-place tag bump against the old mount will not start.
      - pg-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-topos} -d ${POSTGRES_DB:-topos}"]
      interval: 5s
      timeout: 5s
      retries: 12

  plane:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # BYO override: point this at a managed Postgres instead (and you can drop the `db` service). A
      # managed/networked Postgres should append `?sslmode=require` — the plane speaks TLS to Postgres over rustls.
      DATABASE_URL: ${DATABASE_URL:-postgres://${POSTGRES_USER:-topos}:${POSTGRES_PASSWORD:-topos}@db:5432/${POSTGRES_DB:-topos}}
      # The public base URL the invite + verification links are built on — set it to your externally
      # reachable address behind a reverse proxy (which also terminates TLS).
      TOPOS_PLANE_BASE_URL: ${TOPOS_PLANE_BASE_URL:-http://localhost:8787}
      TOPOS_PLANE_MODE: self_host
      # ── optional operator features (uncomment to enable; full reference in the README) ──────────
      # The operator admin bearer token (only its sha256 is retained). Enables the review-required
      # policy toggle — `PUT /v1/workspaces/{ws}/policy/review-required`; while unset, that route
      # answers 404.
      # TOPOS_PLANE_ADMIN_TOKEN: change-me-to-a-long-random-secret
      # Emailed-passcode enrollment: set ALL FIVE to enable it (otherwise the plane advertises the
      # device-code method). Credentials are never logged.
      # TOPOS_PLANE_SMTP_HOST: smtp.example.com
      # TOPOS_PLANE_SMTP_PORT: "587"
      # TOPOS_PLANE_SMTP_USER: postmaster@example.com
      # TOPOS_PLANE_SMTP_PASS: change-me
      # TOPOS_PLANE_SMTP_FROM: topos@example.com
    ports:
      - "8787:8787"
    volumes:
      # The git-object + large-object stores and the 0600 signing key / enrollment secret (generated on
      # first boot). Snapshot these BEFORE the database (see the README's backup order).
      - plane-data:/data

volumes:
  pg-data:
  plane-data:
